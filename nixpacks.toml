[phases.setup]
nixPkgs = ["python310", "nodejs-18_x", "gcc"]

[phases.install]
cmds = [
    "cd frontend && npm install",
    "cd backend && pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "cd frontend && npm run build"
]

[start]
cmd = "gunicorn --directory backend app:app"